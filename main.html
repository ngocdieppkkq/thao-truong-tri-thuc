<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thao Trường Tri Thức: Hỏi đúng - đáp nhanh Nghị quyết Đại hội XIV</title>
    <style>
        :root {
            --primary-color: #d32f2f;
            --success-color: #2ecc71;
            --danger-color: #e74c3c;
            --warning-color: #f1c40f;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            margin: 0;
            padding: 20px;
            height: 100vh;
            overflow: hidden; 
        }

        .header-image {
            width: 100%;
            max-width: 50%; 
            height: auto;
            display: block;
            margin: 0 auto 10px auto;
            border-radius: 10px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 900px;
            margin: 0 auto;
        }

        .gift-box {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            border-bottom: 5px solid var(--primary-color);
        }

        .gift-box:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.2); }
        .gift-box img { width: 60px; margin-bottom: 10px; }
        .gift-box h3 { margin: 0; color: #2c3e50; font-size: 15px; text-transform: uppercase; }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .popup {
            background: white;
            padding: 30px;
            border-radius: 25px;
            width: 90%;
            max-width: 700px;
            text-align: center;
            animation: scaleUp 0.3s ease-out;
        }

        @keyframes scaleUp { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .question-text {
            font-size: 22px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 25px;
            text-align: left;
            line-height: 1.4;
        }

        .option-btn {
            width: 100%;
            padding: 18px;
            margin: 10px 0;
            border: 2px solid #ddd;
            background: #f8f9fa;
            border-radius: 15px;
            cursor: pointer;
            font-size: 18px;
            text-align: left;
            font-weight: 500;
            transition: 0.2s;
        }

        .option-btn:hover { background: #e9ecef; border-color: #adb5bd; }
        .option-btn.correct { background: var(--success-color) !important; color: white; border-color: #27ae60; }
        .option-btn.wrong { background: var(--danger-color) !important; color: white; border-color: #c0392b; }

        #feedback {
            font-size: 20px;
            font-weight: bold;
            margin-top: 15px;
            height: 30px;
        }

        .btn-exit {
            margin-top: 25px;
            padding: 10px 30px;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        @media (max-width: 600px) { .grid-container { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

    <img src="header.png" alt="HEADER" class="header-image">
    <p style="color: #576574; font-weight: bold;">MỜI ĐỒNG CHÍ CHỌN BỘ CÂU HỎI:</p>
    
    <div class="grid-container">
        <div class="gift-box" onclick="startQuiz(1, 10, 'NHỮNG VẤN ĐỀ CHUNG & TẦM NHÌN')">
            <img src="https://cdn-icons-png.flaticon.com/512/5726/5726678.png">
            <h3>NHỮNG VẤN ĐỀ CHUNG & TẦM NHÌN</h3>
        </div>
        <div class="gift-box" onclick="startQuiz(11, 20, 'QUỐC PHÒNG, AN NINH & ĐỐI NGOẠI')">
            <img src="https://cdn-icons-png.flaticon.com/512/5726/5726678.png">
            <h3>QUỐC PHÒNG, AN NINH & ĐỐI NGOẠI</h3>
        </div>
        <div class="gift-box" onclick="startQuiz(21, 30, 'PHÁT HUY SỨC MẠNH NHÂN DÂN & ĐẠI ĐOÀN KẾT')">
            <img src="https://cdn-icons-png.flaticon.com/512/5726/5726678.png">
            <h3>PHÁT HUY SỨC MẠNH NHÂN DÂN & ĐẠI ĐOÀN KẾT</h3>
        </div>
        <div class="gift-box" onclick="startQuiz(31, 40, 'ĐỘT PHÁ CHIẾN LƯỢC & KINH TẾ')">
            <img src="https://cdn-icons-png.flaticon.com/512/5726/5726678.png">
            <h3>ĐỘT PHÁ CHIẾN LƯỢC & KINH TẾ</h3>
        </div>
        <div class="gift-box" onclick="startQuiz(41, 50, 'XÂY DỰNG ĐẢNG VÀ HỆ THỐNG CHÍNH TRỊ')">
            <img src="https://cdn-icons-png.flaticon.com/512/5726/5726678.png">
            <h3>XÂY DỰNG ĐẢNG VÀ HỆ THỐNG CHÍNH TRỊ</h3>
        </div>
        <div class="gift-box" onclick="startQuiz(51, 60, 'CÁC CHỈ TIÊU & MỤC TIÊU CỤ THỂ KHÁC')">
            <img src="https://cdn-icons-png.flaticon.com/512/5726/5726678.png">
            <h3>CÁC CHỈ TIÊU & MỤC TIÊU CỤ THỂ KHÁC</h3>
        </div>
    </div>

    <div id="overlay-quiz" class="overlay">
        <div class="popup">
            <div id="quiz-info" style="display: flex; justify-content: space-between; color: var(--primary-color); font-weight: bold; margin-bottom: 10px;">
                <span id="set-name-display"></span>
                <span id="progress-display"></span>
            </div>
            <div id="question-text" class="question-text"></div>
            <div id="options-list"></div>
            <div id="feedback"></div>
            <button class="btn-exit" onclick="closeQuiz()">THOÁT</button>
        </div>
    </div>

    <script>
        const quizBank = [
            // BỘ 1 [cite: 279-329]
            { id: 1, q: "Theo Đại hội XIV, chúng ta đã trải qua bao nhiêu năm thực hiện công cuộc đổi mới đất nước?", a: "C", opts: { A: "30 năm", B: "35 năm", C: "40 năm", D: "45 năm" } },
            { id: 2, q: "Đến năm 2030, nước ta trở thành nước như thế nào?", a: "C", opts: { A: "Nước thu nhập thấp", B: "Nước công nghiệp cũ", C: "Đang phát triển có công nghiệp hiện đại, thu nhập trung bình cao", D: "Nước phát triển cao" } },
            { id: 3, q: "Tầm nhìn đến năm 2045, nước ta phấn đấu trở thành nước như thế nào?", a: "C", opts: { A: "Nước công nghiệp", B: "Nước thu nhập trung bình", C: "Nước phát triển, thu nhập cao", D: "Nước đang phát triển" } },

            { id: 5, q: "GDP bình quân đầu người đến năm 2030 phấn đấu đạt khoảng?", a: "C", opts: { A: "6.500 USD", B: "7.500 USD", C: "8.500 USD", D: "9.500 USD" } },
            { id: 6, q: "Nhân tố hàng đầu quyết định mọi thắng lợi của cách mạng Việt Nam là gì?", a: "A", opts: { A: "Sự lãnh đạo của Đảng, sức mạnh Nhân dân và khối đại đoàn kết", B: "Vốn nước ngoài", C: "Tài nguyên", D: "Vị trí địa lý" } },

            { id: 8, q: "Tỉ lệ che phủ rừng duy trì ở mức bao nhiêu %?", a: "C", opts: { A: "40%", B: "41%", C: "42%", D: "43%" } },
            { id: 9, q: "Giai đoạn phát triển mới của đất nước được gọi là kỷ nguyên gì?", a: "B", opts: { A: "Kỷ nguyên số", B: "Kỷ nguyên vươn mình của dân tộc", C: "Kỷ nguyên hội nhập", D: "Kỷ nguyên mới" } },
            { id: 10, q: "Nhiệm vụ nào được xác định là 'Trung tâm'?", a: "C", opts: { A: "Xây dựng Đảng", B: "Văn hóa", C: "Phát triển kinh tế, xã hội, bảo vệ môi trường", D: "Quốc phòng" } },
            // BỘ 2 [cite: 330-380]
            { id: 11, q: "Mục tiêu xây dựng Quân đội nhân dân theo Nghị quyết XIV là?", a: "C", opts: { A: "Chính quy", B: "Tinh nhuệ", C: "Cách mạng, chính quy, tinh nhuệ, hiện đại", D: "Từng bước hiện đại" } },
            { id: 12, q: "Quan điểm bảo vệ Tổ quốc được nhấn mạnh là gì?", a: "B", opts: { A: "Tấn công", B: "Bảo vệ Tổ quốc từ sớm, từ xa", C: "Phòng thủ bị động", D: "Xây dựng rào chắn" } },
            { id: 13, q: "Phương châm phòng thủ quốc gia được xác định là?", a: "B", opts: { A: "Phòng thủ biên giới", B: "Tăng cường quốc phòng toàn dân, phòng thủ chủ động", C: "Liên minh quân sự", D: "Chờ đợi" } },

            { id: 15, q: "Sức mạnh bảo vệ Tổ quốc kết hợp sức mạnh dân tộc với sức mạnh nào?", a: "C", opts: { A: "Quân sự", B: "Kinh tế", C: "Sức mạnh thời đại", D: "Công nghệ" } },

            { id: 25, q: "Đoàn kết dân tộc xây dựng dựa trên cơ sở sức mạnh nào?", a: "C", opts: { A: "Trí thức", B: "Công nhân", C: "Bản lĩnh, trí tuệ con người VN và thế trận lòng dân", D: "Quốc tế" } },
            { id: 26, q: "Chính sách xã hội cần bảo đảm yếu tố '4 An' nào?", a: "C", opts: { A: "An cư lạc nghiệp", B: "An tâm an lòng", C: "An ninh, an sinh, an toàn, an dân", D: "An khang thịnh vượng" } },

            { id: 29, q: "Chủ trương xây dựng nền giáo dục quốc dân như thế nào?", a: "C", opts: { A: "Phổ cập", B: "Miễn phí", C: "Hiện đại, ngang tầm khu vực và thế giới", D: "Nghề thủ công" } },

            // BỘ 4 [cite: 432-482]
            { id: 31, q: "Có mấy đột phá chiến lược trong nhiệm kỳ XIV?", a: "B", opts: { A: "2", B: "3", C: "4", D: "5" } },

            // BỘ 6 [cite: 534-584]
            { id: 51, q: "Chỉ số HDI đến năm 2030 phấn đấu đạt khoảng?", a: "C", opts: { A: "0,7", B: "0,75", C: "0,8", D: "0,9" } },
            { id: 52, q: "Tỉ lệ lao động nông nghiệp giảm xuống còn?", a: "C", opts: { A: "10%", B: "15%", C: "Dưới 20%", D: "30%" } },
            { id: 53, q: "Tỉ lệ lao động qua đào tạo có bằng cấp đạt?", a: "C", opts: { A: "25%", B: "30%", C: "35 - 40%", D: "60%" } },
            { id: 54, q: "Lượng phát thải khí nhà kính giảm bao nhiêu %?", a: "C", opts: { A: "5%", B: "7%", C: "8 - 9%", D: "15%" } },
            { id: 55, q: "Tỉ lệ xử lý nước thải lưu vực sông đạt?", a: "C", opts: { A: "50%", B: "60%", C: "65 - 70%", D: "90%" } },
            { id: 56, q: "Diện tích khu bảo tồn biển đạt tối thiểu bao nhiêu %?", a: "C", opts: { A: "2%", B: "4%", C: "6%", D: "10%" } },
            { id: 57, q: "Cơ sở sản xuất đạt chuẩn môi trường đạt khoảng?", a: "C", opts: { A: "80%", B: "90%", C: "98 - 100%", D: "100%" } },
            { id: 58, q: "Đóng góp của TFP vào tăng trưởng kinh tế đạt?", a: "C", opts: { A: "40%", B: "50%", C: "Trên 55%", D: "100%" } },
            { id: 59, q: "Tỉ trọng kinh tế số phấn đấu đạt bao nhiêu % GDP?", a: "C", opts: { A: "15%", B: "20%", C: "30%", D: "50%" } },
            { id: 60, q: "Hệ thống chính trị vận hành theo mô hình mấy cấp?", a: "B", opts: { A: "2", B: "3", C: "4", D: "5" } }
        ];

        let selectedSet = [];
        let currentIndex = 0;
        let canProceed = false;

        function startQuiz(min, max, setName) {
            // Lọc câu hỏi và bốc 5 câu ngẫu nhiên
            let pool = quizBank.filter(q => q.id >= min && q.id <= max);
            selectedSet = pool.sort(() => 0.5 - Math.random()).slice(0, 5);
            currentIndex = 0;
            
            document.getElementById('set-name-display').innerText = setName;
            document.getElementById('overlay-quiz').style.display = 'flex';
            loadQuestion();
        }

        function loadQuestion() {
            canProceed = false;
            let currentQ = selectedSet[currentIndex];
            document.getElementById('progress-display').innerText = `Câu ${currentIndex + 1}/5`;
            document.getElementById('question-text').innerText = `${currentIndex + 1}. ${currentQ.q}`;
            document.getElementById('feedback').innerText = "";
            
            let optionsHTML = "";
            for (let key in currentQ.opts) {
                optionsHTML += `<button class="option-btn" onclick="checkAnswer(this, '${key}')">${key}. ${currentQ.opts[key]}</button>`;
            }
            document.getElementById('options-list').innerHTML = optionsHTML;
        }

        function checkAnswer(btn, choice) {
            if (canProceed) return; // Nếu đã đúng rồi thì không bấm nữa
            
            let correctAns = selectedSet[currentIndex].a;
            let allBtns = document.querySelectorAll('.option-btn');
            
            if (choice === correctAns) {
                canProceed = true;
                btn.classList.add('correct');
                document.getElementById('feedback').innerHTML = "<span style='color:var(--success-color)'>CHÍNH XÁC! ĐANG CHUYỂN CÂU...</span>";
                
                setTimeout(() => {
                    if (currentIndex < 4) {
                        currentIndex++;
                        loadQuestion();
                    } else {
                        alert("CHÚC MỪNG ĐỒNG CHÍ ĐÃ HOÀN THÀNH XUẤT SẮC BỘ CÂU HỎI!");
                        closeQuiz();
                    }
                }, 1500);
            } else {
                btn.classList.add('wrong');
                document.getElementById('feedback').innerHTML = "<span style='color:var(--danger-color)'>SAI RỒI! MỜI ĐỒNG CHÍ CHỌN LẠI.</span>";
                setTimeout(() => { btn.classList.remove('wrong'); }, 800);
            }
        }

        function closeQuiz() {
            document.getElementById('overlay-quiz').style.display = 'none';
        }
    </script>
</body>
