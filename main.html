<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thao Trường Tri Thức: Hỏi đúng - đáp nhanh Nghị quyết Đại hội XIV</title>
    <style>
        :root {
            --primary-color: #d32f2f;
            --success-color: #2ecc71;
            --danger-color: #e74c3c;
            --warning-color: #f1c40f;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            margin: 0;
            padding: 20px;
            height: 100vh;
            overflow: hidden; 
        }

        .header-image {
            width: 100%;
            max-width: 50%; 
            height: auto;
            display: block;
            margin: 0 auto 10px auto;
            border-radius: 10px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 900px;
            margin: 0 auto;
        }

        .gift-box {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            border-bottom: 5px solid var(--primary-color);
        }

        .gift-box:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.2); }
        .gift-box img { width: 60px; margin-bottom: 10px; }
        .gift-box h3 { margin: 0; color: #2c3e50; font-size: 15px; text-transform: uppercase; }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .popup {
            background: white;
            padding: 30px;
            border-radius: 25px;
            width: 90%;
            max-width: 700px;
            text-align: center;
            animation: scaleUp 0.3s ease-out;
        }

        @keyframes scaleUp { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .question-text {
            font-size: 22px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 25px;
            text-align: left;
            line-height: 1.4;
        }

        .option-btn {
            width: 100%;
            padding: 18px;
            margin: 10px 0;
            border: 2px solid #ddd;
            background: #f8f9fa;
            border-radius: 15px;
            cursor: pointer;
            font-size: 18px;
            text-align: left;
            font-weight: 500;
            transition: 0.2s;
        }

        .option-btn:hover { background: #e9ecef; border-color: #adb5bd; }
        .option-btn.correct { background: var(--success-color) !important; color: white; border-color: #27ae60; }
        .option-btn.wrong { background: var(--danger-color) !important; color: white; border-color: #c0392b; }

        #feedback {
            font-size: 20px;
            font-weight: bold;
            margin-top: 15px;
            height: 30px;
        }

        .btn-exit {
            margin-top: 25px;
            padding: 10px 30px;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        @media (max-width: 600px) { .grid-container { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

    <img src="header.png" alt="HEADER" class="header-image" onerror="this.style.display='none'">
    <p style="color: #576574; font-weight: bold;">MỜI ĐỒNG CHÍ CHỌN BỘ CÂU HỎI:</p>
    
    <div class="grid-container">
        <div class="gift-box" onclick="startQuiz(1, 30, 'THÔNG TIN ĐẠI HỘI & TẦM NHÌN CHIẾN LƯỢC')">
            <img src="https://cdn-icons-png.flaticon.com/512/5726/5726678.png">
            <h3>THÔNG TIN ĐẠI HỘI & TẦM NHÌN CHIẾN LƯỢC</h3>
        </div>
        <div class="gift-box" onclick="startQuiz(31, 60, 'QUỐC PHÒNG AN NINH & ĐỐI NGOẠI')">
            <img src="https://cdn-icons-png.flaticon.com/512/5726/5726678.png">
            <h3>QUỐC PHÒNG AN NINH & ĐỐI NGOẠI</h3>
        </div>
        <div class="gift-box" onclick="startQuiz(61, 90, 'PHÁT HUY SỨC MẠNH NHÂN DÂN & ĐẠI ĐOÀN KẾT')">
            <img src="https://cdn-icons-png.flaticon.com/512/5726/5726678.png">
            <h3>PHÁT HUY SỨC MẠNH NHÂN DÂN & ĐẠI ĐOÀN KẾT </h3>
        </div>
        <div class="gift-box" onclick="startQuiz(91, 120, 'ĐỘT PHÁ CHIẾN LƯỢC, KINH TẾ & MÔI TRƯỜNG')">
            <img src="https://cdn-icons-png.flaticon.com/512/5726/5726678.png">
            <h3>ĐỘT PHÁ CHIẾN LƯỢC, KINH TẾ & MÔI TRƯỜNG</h3>
        </div>
        <div class="gift-box" onclick="startQuiz(121, 150, 'XÂY DỰNG ĐẢNG VÀ HỆ THỐNG CHÍNH TRỊ')">
            <img src="https://cdn-icons-png.flaticon.com/512/5726/5726678.png">
            <h3>XÂY DỰNG ĐẢNG VÀ HỆ THỐNG CHÍNH TRỊ</h3>
        </div>
        <div class="gift-box" onclick="startQuiz(151, 180, 'CÁC CHỈ TIÊU & MỤC TIÊU CỤ THỂ KHÁC')">
            <img src="https://cdn-icons-png.flaticon.com/512/5726/5726678.png">
            <h3>CÁC CHỈ TIÊU & MỤC TIÊU CỤ THỂ KHÁC</h3>
        </div>
    </div>

    <div id="overlay-quiz" class="overlay">
        <div class="popup">
            <div id="quiz-info" style="display: flex; justify-content: space-between; color: var(--primary-color); font-weight: bold; margin-bottom: 10px;">
                <span id="set-name-display"></span>
                <span id="progress-display"></span>
            </div>
            <div id="question-text" class="question-text"></div>
            <div id="options-list"></div>
            <div id="feedback"></div>
            <button class="btn-exit" onclick="closeQuiz()">THOÁT</button>
        </div>
    </div>

    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) || (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0))) {
                return false;
            }
        }
    </script>

            { id: 178, q: "Việc kết hợp phát triển kinh tế - xã hội với quốc phòng, an ninh ở một số địa bàn được đánh giá ra sao?", a: "B", opts: { A: "Đã hoàn hảo, không cần chỉnh sửa", B: "Chưa được quan tâm đúng mức", C: "Đã quá chú trọng làm ảnh hưởng kinh tế", D: "Chỉ được thực hiện ở các đặc khu" } },
            { id: 179, q: "Sau 40 năm đổi mới, vị thế đất nước trên con đường nào được nâng tầm?", a: "B", opts: { A: "Con đường tư bản hóa nhanh chóng", B: "Con đường xây dựng chủ nghĩa xã hội", C: "Con đường trung lập về chính trị", D: "Con đường hướng tâm về nông nghiệp" } },
            { id: 180, q: "Mục tiêu 'kép' được thực hiện trong giai đoạn Covid-19 là gì?", a: "B", opts: { A: "Vừa xuất khẩu gạo vừa nhập khẩu lúa mì", B: "Vừa phòng, chống dịch bệnh, vừa phục hồi, phát triển kinh tế", C: "Vừa xây đường bộ vừa xây đường thủy", D: "Vừa học online vừa học offline" } }
        ];

        let selectedSet = [];
        let currentIndex = 0;
        let canProceed = false;
        let score = 0; // Thêm biến để lưu số câu trả lời đúng

        function startQuiz(min, max, setName) {
            let pool = quizBank.filter(q => q.id >= min && q.id <= max);
            selectedSet = pool.sort(() => 0.5 - Math.random()).slice(0, 10);
            currentIndex = 0;
            score = 0; // Đặt lại điểm về 0 khi bắt đầu bộ mới
            
            document.getElementById('set-name-display').innerText = setName;
            document.getElementById('overlay-quiz').style.display = 'flex';
            loadQuestion();
        }

        function loadQuestion() {
            canProceed = false;
            let currentQ = selectedSet[currentIndex];
            document.getElementById('progress-display').innerText = `Câu ${currentIndex + 1}/10`;
            document.getElementById('question-text').innerHTML = `${currentIndex + 1}. ${currentQ.q}`;
            document.getElementById('feedback').innerText = "";
            
            let optionsHTML = "";
            for (let key in currentQ.opts) {
                // Thêm id="opt-A", id="opt-B"... để có thể tự động đổi màu đáp án đúng
                optionsHTML += `<button id="opt-${key}" class="option-btn" onclick="checkAnswer(this, '${key}')">${key}. ${currentQ.opts[key]}</button>`;
            }
            document.getElementById('options-list').innerHTML = optionsHTML;
            document.getElementById('options-list').style.display = 'block'; // Hiện lại các nút nếu trước đó bị ẩn
        }

        function checkAnswer(btn, choice) {
            if (canProceed) return; 
            canProceed = true; // Khóa lại, không cho bấm nhiều đáp án cùng lúc
            
            let correctAns = selectedSet[currentIndex].a;
            
            if (choice === correctAns) {
                score++; // Cộng 1 điểm
                btn.classList.add('correct');
                document.getElementById('feedback').innerHTML = "<span style='color:var(--success-color)'>CHÍNH XÁC!</span>";
            } else {
                btn.classList.add('wrong'); // Nút vừa chọn bị sai (chuyển đỏ)
                document.getElementById(`opt-${correctAns}`).classList.add('correct'); // Tự động làm sáng nút đúng (chuyển xanh)
                document.getElementById('feedback').innerHTML = `<span style='color:var(--danger-color)'>SAI RỒI! Đáp án đúng là ${correctAns}</span>`;
            }

            // Đợi 2 giây để chiến sĩ kịp nhìn đáp án rồi mới chuyển câu
            setTimeout(() => {
                if (currentIndex < 9) { 
                    currentIndex++;
                    loadQuestion();
                } else {
                    showResult(); // Hết 10 câu thì gọi hàm hiện điểm
                }
            }, 2000);
        }

        function showResult() {
            document.getElementById('progress-display').innerText = "ĐÃ HOÀN THÀNH";
            
            // Xóa câu hỏi và thay bằng màn hình tổng kết điểm
            document.getElementById('question-text').innerHTML = `
                <div style="text-align: center; padding: 10px;">
                    <h3 style="color: var(--primary-color); margin-bottom: 5px;">!!! XIN CHÚC MỪNG !!!</h3>
                    <p style="font-size: 18px;">Đồng chí đã trả lời đúng:</p>
                    <div style="font-size: 60px; font-weight: bold; color: var(--success-color); margin: 10px 0;">
                        ${score} <span style="font-size: 30px; color: #2c3e50;">/ 10</span>
                    </div>
                    <p style="font-size: 18px;">câu hỏi!</p>
                </div>
            `;
            
            // Ẩn các nút A B C D và dòng phản hồi
            document.getElementById('options-list').style.display = 'none';
            document.getElementById('feedback').innerHTML = "";
        }

        function closeQuiz() {
            document.getElementById('overlay-quiz').style.display = 'none';
        }
    </script>
