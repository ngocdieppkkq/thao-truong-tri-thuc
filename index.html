<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thao Trường Tri Thức: Hỏi đúng - đáp nhanh Nghị quyết Đại hội XIV</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

       .unit-title {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 86, 179, 0.7); /* Nền màu xanh dương mờ (70%) */
            color: white;
            font-size: 22px;
            font-weight: bold;
            padding: 8px 40px;
            border-radius: 0 0 15px 15px; /* Bo tròn 2 góc dưới */
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 100;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('anhbia.png');
            background-size: cover;
            background-position: center;
            filter: brightness(70%) blur(3px);
            z-index: -1;
        }


        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

       
        .intro-popup {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            width: 85%;
            border: 4px solid #d32f2f;
            animation: fadeInOut 1s ease-out;
        }

        @keyframes fadeInOut {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        h1 {
            color: #d32f2f;
            margin-bottom: 10px;
            font-size: 28px;
            text-transform: uppercase;
        }

        .info-text {
            color: #2c3e50;
            line-height: 1.8;
            margin-bottom: 30px;
            font-size: 17px;
        }

        .info-text b {
            color: #d32f2f;
        }

       
        .btn-start {
            display: inline-block;
            background: #d32f2f;
            color: white;
            text-decoration: none;
            padding: 15px 50px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(211, 47, 47, 0.4);
        }

        .btn-start:hover {
            background: #b71c1c;
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(211, 47, 47, 0.6);
        }
    </style>
</head>
<body>
    <div class="unit-title"> <center>TRUNG ĐOÀN 285 <br> ĐOÀN NAM TRIỆU ANH HÙNG</div>
    <div class="background"></div>
    
    <div class="overlay">
        <div class="intro-popup">
            <h1>Thao trường tri thức:</h1>
            <p style="font-weight: bold; color: #2c3e50; margin-top: -10px; margin-bottom: 20px;">
                HỎI ĐÚNG - ĐÁP NHANH NGHỊ QUYẾT ĐẠI HỘI XIV
            </p>
            
            <div class="info-text">
                Tác giả: <b>Phạm Ngọc Điệp</b><br>
		Cấp bậc: <b>Thượng úy</b><br>
                Chức vụ: <b>Chính trị viên phó Tiểu đoàn</b><br>
		Đơn vị: <b>Tiểu đoàn 72, Trung đoàn 285</b><br>
                Liên hệ, góp ý: <b>0988.833.524</b>
            </div>

            <a href="main.html" class="btn-start">BẮT ĐẦU</a>
        </div>
    </div>

</body>
</html>
